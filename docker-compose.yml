# Optional containerized deployment for TS Assistant (bead ez9).
#
# The bare-metal path (uv + npm, see README) stays fully supported — this is just a
# one-command convenience for people who don't want to install Python/uv/Node.
#
# Quick start:
#   1. cp .env.example .env   and edit it (at minimum, point TS_DB_DIR at the folder
#      that holds your schedulerdb.sqlite — or drop the DB into ./sample_database and
#      keep the default).
#   2. docker compose up --build
#   3. Open http://<this-host>:5173
#
# Networking note: the browser calls the backend directly at http://<same-host>:8008,
# so BOTH ports are published. If you remap the backend port, also build the frontend
# with VITE_API_BASE (see frontend/Dockerfile) so the app knows where to find it.

services:
  backend:
    build: ./backend
    image: ts-assistant-backend
    ports:
      - "${TS_BACKEND_PORT:-8008}:8008"
    environment:
      # Gzip the pre-write backups (each is roughly the size of your whole DB).
      TS_ASSISTANT_BACKUP_GZIP: "${TS_ASSISTANT_BACKUP_GZIP:-0}"
    volumes:
      # The folder holding your Target Scheduler DB. The app operates in place: it reads
      # AND writes this database, taking a backup before every write. Mounted read-write
      # so it can write the DB plus its SQLite -wal/-shm sidecars; mounting the
      # *directory* (not the file) is required for those sidecars.
      # NOTE: TS_DB_DIR must be writable LOCAL storage. SQLite writes are unreliable on
      # network shares / file-sync replicas (SMB/CIFS/NFS, Syncthing, Dropbox) — see
      # .env.example. Copy the DB local rather than pointing this at a synced folder.
      - "${TS_DB_DIR:-./sample_database}:/app/sample_database"
      # Timestamped pre-write backups, kept as a host bind so they're easy to grab if you
      # ever need to restore (./data/backups).
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: ts-assistant-frontend
    ports:
      - "${TS_FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    restart: unless-stopped
